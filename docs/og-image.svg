<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ddff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#05060a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0c14;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="alert-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffcc00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8800;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Glow effects -->
  <ellipse cx="300" cy="250" rx="400" ry="300" fill="#00ff88" opacity="0.03"/>
  <ellipse cx="900" cy="400" rx="350" ry="250" fill="#00ddff" opacity="0.04"/>
  <ellipse cx="600" cy="500" rx="300" ry="200" fill="#ffcc00" opacity="0.02"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#grad)"/>

  <!-- Live indicator -->
  <circle cx="120" cy="120" r="6" fill="#00ff88"/>
  <circle cx="120" cy="120" r="10" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.5"/>
  <text x="136" y="124" font-family="monospace" font-size="14" fill="#00ff88" font-weight="700">LIVE</text>

  <!-- Title -->
  <text x="100" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="76" font-weight="900" fill="#e4e4ef" letter-spacing="-3">
    whale watcher
  </text>

  <!-- Subtitle -->
  <text x="100" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#8888a0" font-weight="500">
    Real-Time Solana Whale Intelligence
  </text>

  <!-- Simulated transaction rows -->
  <g transform="translate(100, 310)">
    <!-- Row 1 — mega -->
    <rect x="0" y="0" width="700" height="44" rx="8" fill="#12121a" stroke="#1e1e30" stroke-width="1"/>
    <rect x="12" y="10" width="60" height="24" rx="5" fill="rgba(255,68,102,0.12)" stroke="rgba(255,68,102,0.25)" stroke-width="1"/>
    <text x="42" y="27" font-family="monospace" font-size="11" fill="#ff4466" text-anchor="middle" font-weight="700">SEND</text>
    <text x="90" y="27" font-family="monospace" font-size="13" fill="#555577">9WzD...WWM</text>
    <text x="220" y="27" font-family="monospace" font-size="10" fill="#00ddff">Binance Hot Wallet</text>
    <text x="620" y="27" font-family="monospace" font-size="16" fill="#ff4466" font-weight="800" text-anchor="end">142.5K SOL</text>
    <text x="685" y="27" font-family="monospace" font-size="10" fill="#555577" text-anchor="end">14:32:08</text>

    <!-- Row 2 — large -->
    <rect x="0" y="52" width="700" height="44" rx="8" fill="#0f1119" stroke="#1e1e30" stroke-width="1"/>
    <rect x="12" y="62" width="60" height="24" rx="5" fill="rgba(0,255,136,0.12)" stroke="rgba(0,255,136,0.25)" stroke-width="1"/>
    <text x="42" y="79" font-family="monospace" font-size="11" fill="#00ff88" text-anchor="middle" font-weight="700">RECV</text>
    <text x="90" y="79" font-family="monospace" font-size="13" fill="#555577">H8sM...WjS</text>
    <text x="220" y="79" font-family="monospace" font-size="10" fill="#00ddff">Coinbase Prime</text>
    <text x="620" y="79" font-family="monospace" font-size="16" fill="#ffcc00" font-weight="800" text-anchor="end">28.3K SOL</text>
    <text x="685" y="79" font-family="monospace" font-size="10" fill="#555577" text-anchor="end">14:31:45</text>

    <!-- Row 3 — swap -->
    <rect x="0" y="104" width="700" height="44" rx="8" fill="#12121a" stroke="#1e1e30" stroke-width="1"/>
    <rect x="12" y="114" width="60" height="24" rx="5" fill="rgba(68,136,255,0.12)" stroke="rgba(68,136,255,0.25)" stroke-width="1"/>
    <text x="42" y="131" font-family="monospace" font-size="11" fill="#4488ff" text-anchor="middle" font-weight="700">SWAP</text>
    <text x="90" y="131" font-family="monospace" font-size="13" fill="#555577">AST...kRQq</text>
    <text x="220" y="131" font-family="monospace" font-size="10" fill="#00ddff">Jump Trading</text>
    <text x="620" y="131" font-family="monospace" font-size="16" fill="#e4e4ef" font-weight="800" text-anchor="end">5.2K SOL</text>
    <text x="685" y="131" font-family="monospace" font-size="10" fill="#555577" text-anchor="end">14:31:12</text>
  </g>

  <!-- Stats boxes -->
  <g transform="translate(850, 310)">
    <rect x="0" y="0" width="250" height="66" rx="10" fill="#12121a" stroke="#1e1e30" stroke-width="1"/>
    <text x="20" y="28" font-family="monospace" font-size="12" fill="#555577">24h Volume</text>
    <text x="230" y="28" font-family="monospace" font-size="20" fill="url(#grad)" font-weight="800" text-anchor="end">2.4M SOL</text>
    <text x="230" y="50" font-family="monospace" font-size="11" fill="#00ff88" text-anchor="end">+12.3%</text>
  </g>

  <g transform="translate(850, 386)">
    <rect x="0" y="0" width="250" height="66" rx="10" fill="#12121a" stroke="#1e1e30" stroke-width="1"/>
    <text x="20" y="28" font-family="monospace" font-size="12" fill="#555577">Active Whales</text>
    <text x="230" y="28" font-family="monospace" font-size="20" fill="#4488ff" font-weight="800" text-anchor="end">10</text>
    <text x="230" y="50" font-family="monospace" font-size="11" fill="#555577" text-anchor="end">Tracked wallets</text>
  </g>

  <!-- Alert box -->
  <g transform="translate(100, 480)">
    <rect x="0" y="0" width="1000" height="50" rx="10" fill="rgba(255,204,0,0.05)" stroke="rgba(255,204,0,0.15)" stroke-width="1"/>
    <text x="20" y="31" font-family="monospace" font-size="13" fill="#ffcc00" font-weight="700">!! ALERT</text>
    <text x="120" y="31" font-family="monospace" font-size="13" fill="#e4e4ef">Binance moved</text>
    <text x="275" y="31" font-family="monospace" font-size="13" fill="#ff4466" font-weight="800">142,500 SOL</text>
    <text x="430" y="31" font-family="monospace" font-size="13" fill="#e4e4ef">($11.6M) — possible exchange outflow</text>
    <text x="980" y="31" font-family="monospace" font-size="11" fill="#555577" text-anchor="end">just now</text>
  </g>

  <!-- Footer -->
  <text x="100" y="590" font-family="system-ui" font-size="15" fill="#555577">
    Free &amp; open source — github.com/visioneth/whale-watcher
  </text>
  <text x="1100" y="590" font-family="monospace" font-size="16" fill="#555577" text-anchor="end" font-weight="600">visioneth</text>

  <!-- Bottom bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#grad)"/>
</svg>
